<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Sycamore Tree · Flipped</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', 'Avenir', sans-serif;
            background: linear-gradient(180deg, #87CEEB 0%, #b8cbd9 100%);
        }
        #info {
            position: absolute;
            bottom: 24px;
            left: 24px;
            color: rgba(255, 255, 240, 0.95);
            background: rgba(20, 30, 18, 0.4);
            backdrop-filter: blur(8px);
            padding: 10px 24px;
            border-radius: 40px;
            font-size: 15px;
            pointer-events: none;
            z-index: 20;
            border-left: 5px solid #b8c9a8;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }
        #title {
            position: absolute;
            top: 28px;
            right: 36px;
            color: #f3eed9;
            text-shadow: 3px 3px 12px #0f1a0e;
            font-size: 2.6rem;
            font-weight: 400;
            letter-spacing: 6px;
            z-index: 20;
            pointer-events: none;
            font-family: 'Times New Roman', serif;
            opacity: 0.9;
        }
        #sub {
            position: absolute;
            top: 82px;
            right: 38px;
            color: #ddd2bc;
            text-shadow: 1px 1px 8px #0f1a0e;
            font-size: 1rem;
            z-index: 20;
            pointer-events: none;
            font-style: italic;
        }
        #instruction {
            position: absolute;
            bottom: 24px;
            right: 24px;
            color: rgba(255, 255, 240, 0.7);
            background: rgba(20, 30, 18, 0.3);
            backdrop-filter: blur(4px);
            padding: 8px 18px;
            border-radius: 30px;
            font-size: 13px;
            pointer-events: none;
            z-index: 20;
        }
        @media (max-width: 600px) {
            #title { font-size: 1.8rem; top: 16px; right: 16px; }
            #sub { font-size: 0.8rem; top: 60px; right: 18px; }
        }
    </style>
</head>
<body>
    <div id="title">THE SYCAMORE TREE</div>
    <div id="sub">"Some of us get dipped in flat, some in satin, some in gloss…"</div>
    <div id="info">🌿 Drag to orbit · Scroll to zoom · Wind in the leaves</div>
    <div id="instruction">🖱️ Click and drag to look around</div>

    <!-- Use CDN for Three.js only - no external modules needed -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    
    <script>
        // Wait for everything to load
        window.addEventListener('load', function() {
            // --- Setup Scene, Camera, Renderer ---
            const scene = new THREE.Scene();
            scene.background = new THREE.Color(0xb8cbd9);
            scene.fog = new THREE.FogExp2(0xb8cbd9, 0.0035);
            
            const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(18, 11, 28);
            camera.lookAt(0, 7, 0);
            
            const renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            document.body.appendChild(renderer.domElement);
            
            // --- Controls ---
            const controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.autoRotate = true;
            controls.autoRotateSpeed = 0.6;
            controls.enableZoom = true;
            controls.enablePan = false;
            controls.maxPolarAngle = Math.PI / 2.3;
            controls.minDistance = 8;
            controls.maxDistance = 45;
            controls.target.set(0, 7, 0);
            
            // --- Lighting ---
            scene.add(new THREE.AmbientLight(0x404c66, 0.45));
            
            const sunLight = new THREE.DirectionalLight(0xfff2d6, 1.3);
            sunLight.position.set(20, 30, 15);
            sunLight.castShadow = true;
            sunLight.receiveShadow = true;
            sunLight.shadow.mapSize.width = 2048;
            sunLight.shadow.mapSize.height = 2048;
            const d = 30;
            sunLight.shadow.camera.left = -d;
            sunLight.shadow.camera.right = d;
            sunLight.shadow.camera.top = d;
            sunLight.shadow.camera.bottom = -d;
            sunLight.shadow.camera.near = 1;
            sunLight.shadow.camera.far = 50;
            sunLight.shadow.bias = -0.0005;
            scene.add(sunLight);
            
            const fillLight = new THREE.PointLight(0xeebb88, 0.7);
            fillLight.position.set(-15, 9, 20);
            scene.add(fillLight);
            
            const backLight = new THREE.PointLight(0xaaccff, 0.5);
            backLight.position.set(-8, 12, -25);
            scene.add(backLight);
            
            // --- Ground ---
            const groundGeo = new THREE.CircleGeometry(60, 32);
            const groundMat = new THREE.MeshStandardMaterial({ 
                color: 0x4a6741, 
                roughness: 0.85, 
                metalness: 0.05,
                side: THREE.DoubleSide 
            });
            const ground = new THREE.Mesh(groundGeo, groundMat);
            ground.rotation.x = -Math.PI / 2;
            ground.position.y = -0.05;
            ground.receiveShadow = true;
            scene.add(ground);
            
            // Ground details
            const grassMat = new THREE.MeshStandardMaterial({ color: 0x5d7a4a, roughness: 0.9 });
            for (let i = 0; i < 200; i++) {
                const patch = new THREE.Mesh(new THREE.CylinderGeometry(0.12, 0.16, 0.04, 5), grassMat);
                const angle = Math.random() * Math.PI * 2;
                const radius = 5 + Math.random() * 20;
                patch.position.x = Math.cos(angle) * radius;
                patch.position.z = Math.sin(angle) * radius;
                patch.position.y = 0;
                patch.receiveShadow = true;
                patch.rotation.y = Math.random() * Math.PI;
                scene.add(patch);
            }
            
            // --- Create the Sycamore Tree (Procedurally generated) ---
            const treeGroup = new THREE.Group();
            
            // Bark material with texture-like variation
            const barkMat = new THREE.MeshStandardMaterial({
                color: 0x9b8c7a,
                roughness: 0.85,
                metalness: 0.05,
                flatShading: false
            });
            
            // Leaf material
            const leafMat = new THREE.MeshStandardMaterial({
                color: 0x7ca86b,
                roughness: 0.55,
                metalness: 0.0,
                emissive: new THREE.Color(0x334d2e),
                emissiveIntensity: 0.15,
                transparent: true,
                side: THREE.DoubleSide
            });
            
            // Helper function to create branches recursively
            function createBranch(startPoint, direction, length, thickness, angle, level) {
                const endPoint = startPoint.clone().add(direction.clone().multiplyScalar(length));
                
                // Create cylinder for this branch
                const cylinder = new THREE.Mesh(
                    new THREE.CylinderGeometry(thickness * 0.8, thickness, length, 6),
                    barkMat
                );
                
                // Position and rotate cylinder to align with direction
                const midpoint = startPoint.clone().add(endPoint).multiplyScalar(0.5);
                cylinder.position.copy(midpoint);
                
                const quaternion = new THREE.Quaternion().setFromUnitVectors(
                    new THREE.Vector3(0, 1, 0),
                    direction.clone().normalize()
                );
                cylinder.quaternion.copy(quaternion);
                
                cylinder.castShadow = true;
                cylinder.receiveShadow = true;
                treeGroup.add(cylinder);
                
                // Add leaves at the end of branches (for higher levels)
                if (level >= 2) {
                    const leafCluster = new THREE.Mesh(new THREE.SphereGeometry(length * 0.8, 5), leafMat);
                    leafCluster.position.copy(endPoint);
                    leafCluster.castShadow = true;
                    leafCluster.receiveShadow = true;
                    treeGroup.add(leafCluster);
                }
                
                // Stop recursion if branch is too small
                if (length < 1.2 || level > 5) return;
                
                // Create sub-branches
                const numBranches = level === 0 ? 4 : (level === 1 ? 3 : 2);
                const newLength = length * (0.65 + Math.random() * 0.15);
                const newThickness = thickness * 0.65;
                
                for (let i = 0; i < numBranches; i++) {
                    // Calculate new direction with spread
                    const spreadAngle = (angle + 20 + Math.random() * 30) * (Math.PI / 180);
                    const rotationAngle = (i / numBranches) * Math.PI * 2 + Math.random() * 0.5;
                    
                    // Create rotation matrix
                    const up = new THREE.Vector3(0, 1, 0);
                    const axis = new THREE.Vector3().crossVectors(up, direction).normalize();
                    
                    if (axis.length() > 0.1) {
                        const rotatedDir = direction.clone().applyAxisAngle(axis, spreadAngle);
                        const finalDir = rotatedDir.applyAxisAngle(direction, rotationAngle);
                        
                        createBranch(
                            endPoint,
                            finalDir,
                            newLength,
                            newThickness,
                            angle * 0.9,
                            level + 1
                        );
                    }
                }
            }
            
            // Create the main trunk and branches
            const trunkStart = new THREE.Vector3(0, 0, 0);
            const trunkDir = new THREE.Vector3(0, 1, 0);
            createBranch(trunkStart, trunkDir, 8, 1.8, 5, 0);
            
            // Add extra foliage clusters for fullness
            for (let i = 0; i < 40; i++) {
                const angle = Math.random() * Math.PI * 2;
                const radius = 2.5 + Math.random() * 5;
                const height = 6 + Math.random() * 6;
                
                const cluster = new THREE.Mesh(new THREE.SphereGeometry(1.2 + Math.random() * 1.5, 6), leafMat);
                cluster.position.x = Math.cos(angle) * radius;
                cluster.position.z = Math.sin(angle) * radius;
                cluster.position.y = height;
                cluster.castShadow = true;
                cluster.receiveShadow = true;
                treeGroup.add(cluster);
            }
            
            // Add top foliage
            const topCluster = new THREE.Mesh(new THREE.SphereGeometry(2.5, 7), leafMat);
            topCluster.position.y = 12;
            topCluster.position.x = 0.5;
            topCluster.position.z = -0.5;
            topCluster.castShadow = true;
            topCluster.receiveShadow = true;
            treeGroup.add(topCluster);
            
            treeGroup.position.y = 0;
            scene.add(treeGroup);
            
            // Store leaf meshes for wind animation
            const leafMeshes = [];
            treeGroup.children.forEach(child => {
                if (child.material === leafMat || (child.material && child.material.color.getHex() === 0x7ca86b)) {
                    leafMeshes.push(child);
                }
            });
            
            // --- Atmospheric particles ---
            const particleGeo = new THREE.BufferGeometry();
            const particleCount = 600;
            const positions = new Float32Array(particleCount * 3);
            for (let i = 0; i < particleCount * 3; i += 3) {
                const r = 15 + Math.random() * 25;
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.random() * Math.PI * 2;
                positions[i] = Math.sin(theta) * Math.cos(phi) * r;
                positions[i+1] = 5 + Math.random() * 15;
                positions[i+2] = Math.sin(theta) * Math.sin(phi) * r;
            }
            particleGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            const particleMat = new THREE.PointsMaterial({
                color: 0xe8dcc0,
                size: 0.1,
                transparent: true,
                blending: THREE.AdditiveBlending,
                depthWrite: false
            });
            const particles = new THREE.Points(particleGeo, particleMat);
            scene.add(particles);
            
            // --- Add some distant elements for atmosphere ---
            const hillMat = new THREE.MeshStandardMaterial({ color: 0x5a7a4a, roughness: 0.9, emissive: new THREE.Color(0x3a5a3a), emissiveIntensity: 0.1 });
            for (let i = 0; i < 5; i++) {
                const hill = new THREE.Mesh(new THREE.ConeGeometry(8 + Math.random() * 10, 3 + Math.random() * 4, 8), hillMat);
                const angle = (i / 5) * Math.PI * 2;
                hill.position.x = Math.cos(angle) * 35;
                hill.position.z = Math.sin(angle) * 35;
                hill.position.y = -1;
                hill.receiveShadow = true;
                scene.add(hill);
            }
            
            // --- Animation Loop ---
            let clock = new THREE.Clock();
            
            function animate() {
                requestAnimationFrame(animate);
                
                const delta = clock.getDelta();
                const elapsedTime = performance.now() * 0.001;
                
                // Wind effect on leaves
                leafMeshes.forEach((mesh, index) => {
                    if (mesh.position.y > 3) {
                        const windX = Math.sin(elapsedTime * 1.5 + mesh.position.x * 0.5) * 0.08;
                        const windZ = Math.cos(elapsedTime * 1.3 + mesh.position.z * 0.5) * 0.08;
                        mesh.position.x += windX * 0.1;
                        mesh.position.z += windZ * 0.1;
                        
                        // Reset position slightly to prevent drift
                        if (Math.abs(mesh.position.x) > 12) mesh.position.x *= 0.99;
                        if (Math.abs(mesh.position.z) > 12) mesh.position.z *= 0.99;
                    }
                });
                
                // Gentle tree sway
                treeGroup.rotation.z = Math.sin(elapsedTime * 0.3) * 0.01;
                treeGroup.rotation.x = Math.sin(elapsedTime * 0.2) * 0.005;
                
                // Rotate particles
                particles.rotation.y += 0.001;
                
                controls.update();
                renderer.render(scene, camera);
            }
            
            animate();
            
            // --- Window Resize Handler ---
            window.addEventListener('resize', function() {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
            
            console.log('🌳 The Sycamore Tree — "The higher you go, the more you can see."');
        });
    </script>
</body>
</html>
